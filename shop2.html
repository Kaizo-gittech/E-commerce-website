      <div class="filter-pill {{ 'has-value' if material in ['Cotton','Silk','Polyester'] else '' }}" data-pill="matwear">
        <button type="button" class="pill-toggle" onclick="togglePill('matwear')">Material (Wearable) ▾</button>
        <div class="filter-dropdown">

          <div class="chip {{ 'active' if material==m else '' }}" onclick="setMaterial('{{ m }}')">{{ m }}</div>
          {% endfor %}

      <div class="filter-pill {{ 'has-value' if material in ['Wood','3D Printed','Craft Foam','Foam Clay'] else '' }}" data-pill="matweapon">

        <div class="filter-dropdown">
          {% for m in ['Wood','3D Printed','Craft Foam','Foam Clay'] %}
          <div class="chip {{ 'active' if material==m else '' }}" onclick="setMaterial('{{ m }}')">{{ m }}</div>
          {% endfor %}
        </div>
      </div>

      <a class="clear-filters-btn" href="/shop">Clear All</a>
    </form>

    <div class="content">
      <div class="listing-head">
        <div>
          <h1>Collection Series</h1>
          <p>Showing {{ products|length }} of {{ total }} refined pieces — page {{ page }} of {{ total_pages }}</p>
        </div>
        <form method="GET" action="/shop" class="sort-wrap">
          <input type="hidden" name="q" value="{{ q }}">
          <input type="hidden" name="category" value="{{ category }}">
          <input type="hidden" name="price" value="{{ price_range }}">
          <input type="hidden" name="material" value="{{ material }}">
          Sort By:
          <select name="sort" onchange="this.form.submit()">
            <option value="editorial" {{ 'selected' if sort=='editorial' else '' }}>Editorial Choice</option>
            <option value="price-asc" {{ 'selected' if sort=='price-asc' else '' }}>Price: Low to High</option>
            <option value="price-desc" {{ 'selected' if sort=='price-desc' else '' }}>Price: High to Low</option>
            <option value="rating" {{ 'selected' if sort=='rating' else '' }}>Rating</option>
          </select>
        </form>
      </div>

      <div class="grid">
        {% for p in products %}
        <a class="product-card" href="/product/{{ p.id }}">
          <div class="product-img">
            {% if p.badge %}<span class="badge {{ 'limited' if 'Limited' in p.badge else 'new' }}">{{ p.badge }}</span>{% endif %}
            <img src="{{ p.img }}" alt="{{ p.name }}">
          </div>
          <div class="product-info">
            <div class="pcat-label">{{ p.cat_label }}</div>
            <div class="pname">{{ p.name }}</div>
            <div class="stars">★ {{ p.rating }} <span>({{ p.reviews }})</span></div>
            <div class="price-row"><div class="price">₹{{ "{:,}".format(p.price) }}</div></div>
            <div class="btn-group">
              <button type="button" class="add-mini" onclick="event.preventDefault();event.stopPropagation();addToCart({{ p.id }}, '{{ p.name|replace("'", "\\'") }}', {{ p.price }}, '{{ p.img }}')">🛒 Add</button>
              <button type="button" class="buy-mini" onclick="event.preventDefault();event.stopPropagation();buyNow({{ p.id }}, '{{ p.name|replace("'", "\\'") }}', {{ p.price }}, '{{ p.img }}')">Buy Now</button>
            </div>
          </div>
        </a>
        {% else %}
        <p style="grid-column:1/-1; color:var(--ink-soft); padding:40px 0;">No items match your filters. Try adjusting them.</p>
        {% endfor %}
      </div>

      <div class="pagination">
        {% for p in range(1, total_pages + 1) %}
        <a href="/shop?page={{ p }}&q={{ q }}&category={{ category }}&price={{ price_range }}&material={{ material }}&sort={{ sort }}">
          <button class="{{ 'active' if p == page else '' }}">{{ p }}</button>
        </a>
        {% endfor %}
      </div>
    </div>

    <footer style="background:var(--bg-soft); padding:30px 40px; border-top:1px solid var(--border); margin-top:20px;">

  </div>
